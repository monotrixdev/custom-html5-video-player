        <div class="overlay">
            <button title="Rewind" id="rewindLeft"><i class="fa-solid fa-backward"></i></button>
            <div id="playBtn">
            <i class="fa-solid fa-play"></i>
            </div>
            <button title="Forward" id="forwardRight"><i class="fa-solid fa-forward"></i></button>
        </div>
        <div class="controls">
            <button title="Play/Pause" id="playPause"><i class="fa-solid fa-play"></i></button>
            <input title="Video Progress" type="range" id="progress" min="0" max="100" value="0"/>
            <span title="Current Time" id="time">00:00/00:00</span>
            <button title="Mute/Unmute" id="muteUnmute"><i class="fa-solid fa-volume-high"></i></button>
            <input title="Volume" type="range" id="volume" min="0" max="100" step="0.01" value="100"/>
            <div class="speed-wrapper">
                <button id="speedBtn">
                    1x
                </button>
                <div class="speed-menu" id="speedMenu">
                    <div data-speed="0.5">0.5x</div>
                    <div data-speed="1" class="active">1x</div>
                    <div data-speed="1.25">1.25x</div>
                    <div data-speed="1.5">1.5x</div>
                    <div data-speed="2">2x</div>
                </div>
            </div>
            <button title="Fullscreen" id="fullscreen"><i class="fa-solid fa-expand"></i></button>
        </div>
